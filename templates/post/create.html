{% extends 'base.html' %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center mt-5">

    <div class="card shadow-lg border-0 rounded-4 p-4" style="width: 100%; max-width: 600px;">

        <!-- Título -->
        <div class="text-center mb-4">
            <h2 class="fw-bold text-dark">Crear Nuevo Post</h2>
            <p class="text-muted mb-0">
                Completa la información del post
            </p>
        </div>

        <!-- Formulario -->
        <form action="/post/create" method="post">

            <!-- Título -->
            <div class="mb-4">
                <label for="title" class="form-label fw-semibold">
                    Título
                </label>

                <input 
                    type="text"
                    class="form-control form-control-lg rounded-3"
                    name="title_title"
                    id="title"
                    placeholder="Ingresa el título"
                    required
                >
            </div>

            <!-- Contenido -->
            <div class="mb-4">
                <label for="content" class="form-label fw-semibold">
                    Contenido
                </label>

                <textarea
                    class="form-control rounded-3"
                    name="content_content"
                    id="content"
                    rows="5"
                    placeholder="Escribe el contenido del post"
                    required
                ></textarea>
            </div>

            <!-- Botón -->
            <div class="d-grid">
                <button 
                    type="submit"
                    class="btn btn-primary btn-lg rounded-3 fw-bold"
                >
                    Publicar Post
                </button>
            </div>

        </form>

    </div>

</div>

{% endblock %}
