<table class="table table-hover align-middle text-center">

    <thead class="table-dark">

        <tr>
            <th>ID</th>
            <th>DNI</th>
            <th>Nombre</th>
            <th>Edad</th>
            <th>Nota</th>
            <th>Aprobado</th>
        </tr>

    </thead>

    <tbody>

        {% for student in student_list %}

        <tr>

            <td>
                <a href="{{ url_for('get_single_student', student_id=student['id']) }}">
                    {{ student['id'] }}
                </a>
            </td>

            <td>{{ student['dni'] }}</td>
            <td>{{ student['name'] }}</td>
            <td>{{ student['age'] }}</td>
            <td>{{ student['grade'] }}</td>

            <td>

                {% if student['is_approved'] %}
                    <span class="badge bg-success">Sí</span>
                {% else %}
                    <span class="badge bg-danger">No</span>
                {% endif %}

            </td>

        </tr>

        {% endfor %}

    </tbody>

</table>
